<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Option File Editor Pro</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2933;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(620px, 100%);
      background: #ffffff;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 8px 0 24px;
      color: #52606d;
      line-height: 1.5;
    }

    input[type="file"] {
      display: none;
    }

    button {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 6px;
      background: #1769aa;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #155d96;
    }

    output {
      display: block;
      margin-top: 22px;
      padding: 16px;
      min-height: 78px;
      border: 1px solid #d9e2ec;
      border-radius: 6px;
      background: #f8fafc;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>Option File Editor Pro</h1>
    <p>Carregue qualquer arquivo para iniciar a edicao.</p>

    <input id="fileInput" type="file">
    <button id="loadButton" type="button">Carregar arquivo</button>
    <output id="fileInfo">Nenhum arquivo carregado.</output>
  </main>

  <script>
    const fileInput = document.querySelector("#fileInput");
    const loadButton = document.querySelector("#loadButton");
    const fileInfo = document.querySelector("#fileInfo");

    loadButton.addEventListener("click", () => {
      fileInput.click();
    });

    fileInput.addEventListener("change", () => {
      const [file] = fileInput.files;

      if (!file) {
        fileInfo.textContent = "Nenhum arquivo carregado.";
        return;
      }

      fileInfo.textContent = [
        `Nome: ${file.name || "(sem nome)"}`,
        `Tamanho: ${file.size.toLocaleString("pt-BR")} bytes`,
        `Tipo: ${file.type || "Nao informado"}`,
      ].join("\n");
    });
  </script>
</body>
</html>
